<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassChat</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Familjen+Grotesk:wght@400;600;700&display=swap');
:root {
  --bg:#080910;--s1:#0f1016;--s2:#161720;--s3:#1d1e2a;
  --border:#252636;--accent:#4ade80;--accent2:#86efac;
  --blue:#60a5fa;--text:#e4e4f0;--muted:#5a5a72;
  --red:#f87171;--yellow:#fbbf24;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;height:100dvh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 50% 35% at 15% 5%,rgba(74,222,128,.06) 0%,transparent 60%),radial-gradient(ellipse 35% 25% at 85% 95%,rgba(96,165,250,.04) 0%,transparent 60%);pointer-events:none;z-index:0}
.screen{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:1;transition:opacity .28s,transform .28s}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(.97)}
.card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:34px 30px;width:min(430px,94vw);display:flex;flex-direction:column;gap:18px;box-shadow:0 0 50px rgba(74,222,128,.04),0 24px 48px rgba(0,0,0,.45)}
.logo{font-family:'Familjen Grotesk',sans-serif;font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.logo-pulse{width:8px;height:8px;background:var(--accent);border-radius:50%;box-shadow:0 0 10px var(--accent);animation:pulse 2.2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.card-title{font-family:'Familjen Grotesk',sans-serif;font-size:28px;font-weight:700;line-height:1.15}
.card-title em{color:var(--accent);font-style:normal}
.card-sub{font-size:11px;color:var(--muted);margin-top:-10px;letter-spacing:.4px}
.lbl{font-size:10px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:5px}
input[type=text]{background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:11px 13px;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(74,222,128,.12)}
input::placeholder{color:var(--muted);font-size:12px}
.code-inp{font-size:24px!important;letter-spacing:10px;text-align:center;text-transform:uppercase}
.btn{background:var(--accent);border:none;border-radius:8px;color:#000;cursor:pointer;font-family:'Familjen Grotesk',sans-serif;font-size:14px;font-weight:700;padding:12px;transition:opacity .18s,transform .1s,box-shadow .18s;width:100%}
.btn:hover{opacity:.88;box-shadow:0 0 22px rgba(74,222,128,.28)}
.btn:active{transform:scale(.98)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:12px;padding:10px}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent2);box-shadow:none}
.divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:10px;letter-spacing:1px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.err{font-size:11px;color:var(--red);min-height:14px;opacity:0;transition:opacity .2s}
.err.show{opacity:1}
.sb-badge{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--accent2);display:flex;align-items:center;gap:6px}
/* chat */
.chat-wrap{width:min(580px,100vw);height:100dvh;display:flex;flex-direction:column;background:var(--s1);border-left:1px solid var(--border);border-right:1px solid var(--border);position:relative}
.chat-hdr{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-l{display:flex;align-items:center;gap:10px}
.room-badge{background:var(--s3);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:13px;letter-spacing:3px;color:var(--accent);cursor:pointer;transition:border-color .2s}
.room-badge:hover{border-color:var(--accent)}
.online{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.odot{width:6px;height:6px;background:var(--accent);border-radius:50%;box-shadow:0 0 6px var(--accent);animation:pulse 2s infinite}
.hdr-r{display:flex;gap:6px;align-items:center}
.ico{background:none;border:none;cursor:pointer;color:var(--muted);padding:6px;border-radius:6px;font-size:15px;transition:color .2s,background .2s;display:flex;align-items:center}
.ico:hover{color:var(--text);background:var(--s3)}
/* messages */
.msgs{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:4px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{display:flex;flex-direction:column;max-width:80%;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.mine{align-self:flex-end;align-items:flex-end}
.msg.theirs{align-self:flex-start;align-items:flex-start}
.msg.system{align-self:center;max-width:100%}
.msg-meta{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);margin-bottom:3px;padding:0 4px}
.msg-author{font-weight:600}
.bubble{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:8px 32px 8px 12px;font-size:13px;line-height:1.55;color:var(--text);position:relative;word-break:break-word}
.msg.mine .bubble{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.2)}
.msg.system .bubble{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:4px 12px;border-radius:20px}
/* media in bubble */
.bubble img{max-width:100%;max-height:280px;border-radius:8px;display:block;margin-top:4px;cursor:pointer;transition:opacity .2s}
.bubble img:hover{opacity:.9}
.bubble video{max-width:100%;max-height:280px;border-radius:8px;display:block;margin-top:4px}
.file-attach{display:flex;align-items:center;gap:8px;background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-top:4px;text-decoration:none;color:var(--text);transition:border-color .2s;font-size:12px}
.file-attach:hover{border-color:var(--accent)}
.file-icon{font-size:20px;flex-shrink:0}
.file-info{display:flex;flex-direction:column;gap:2px;overflow:hidden}
.file-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px}
.file-size{font-size:10px;color:var(--muted)}
/* react */
.react-btn{position:absolute;top:50%;right:6px;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:12px;color:var(--muted);opacity:0;transition:opacity .15s;padding:2px 4px;border-radius:4px}
.bubble:hover .react-btn{opacity:1}
.picker{position:absolute;bottom:calc(100% + 6px);right:0;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:5px 7px;display:flex;gap:3px;box-shadow:0 8px 24px rgba(0,0,0,.55);z-index:20;animation:popIn .15s ease;white-space:nowrap}
.picker.hidden{display:none}
@keyframes popIn{from{opacity:0;transform:scale(.88) translateY(4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.emo{background:none;border:none;cursor:pointer;font-size:19px;padding:3px 4px;border-radius:6px;transition:background .1s,transform .1s}
.emo:hover{background:var(--s3);transform:scale(1.2)}
.reactions{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.rpill{background:var(--s3);border:1px solid var(--border);border-radius:20px;padding:2px 7px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:3px;transition:all .15s;user-select:none}
.rpill:hover{border-color:var(--accent);transform:scale(1.07)}
.rpill.me{background:rgba(74,222,128,.15);border-color:rgba(74,222,128,.35)}
.rcnt{font-size:10px;color:var(--muted)}
/* input area */
.inp-wrap{border-top:1px solid var(--border);flex-shrink:0}
/* upload preview */
.upload-preview{display:none;padding:8px 18px;gap:8px;flex-wrap:wrap;background:var(--s2);border-bottom:1px solid var(--border)}
.upload-preview.show{display:flex}
.prev-item{position:relative;display:flex;align-items:center;gap:6px;background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:5px 8px;font-size:11px;max-width:180px}
.prev-item img{width:36px;height:36px;object-fit:cover;border-radius:4px}
.prev-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px;flex:1}
.prev-rm{background:none;border:none;cursor:pointer;color:var(--red);font-size:14px;padding:0 2px;flex-shrink:0}
/* progress bar */
.upload-progress{height:2px;background:var(--border);display:none}
.upload-progress.show{display:block}
.progress-bar{height:100%;background:var(--accent);width:0%;transition:width .3s}
.inp-area{padding:10px 18px 13px;display:flex;gap:8px;align-items:flex-end}
.msg-inp{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:9px 13px;outline:none;transition:border-color .2s;resize:none;max-height:100px;overflow-y:auto;line-height:1.5}
.msg-inp:focus{border-color:var(--accent)}
.attach-btn{background:var(--s2);border:1px solid var(--border);border-radius:10px;cursor:pointer;color:var(--muted);padding:9px 11px;font-size:16px;transition:color .2s,border-color .2s;display:flex;align-items:center;flex-shrink:0}
.attach-btn:hover{color:var(--accent);border-color:var(--accent)}
.send-btn{background:var(--accent);border:none;border-radius:10px;cursor:pointer;color:#000;padding:9px 14px;font-size:16px;font-weight:700;transition:opacity .2s,box-shadow .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:hover{opacity:.85;box-shadow:0 0 16px rgba(74,222,128,.3)}
.typing-bar{height:22px;padding:0 18px;display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);flex-shrink:0}
.dots span{display:inline-block;width:4px;height:4px;background:var(--muted);border-radius:50%;animation:blink 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
/* users */
.upanel{position:absolute;top:50px;right:0;bottom:0;width:185px;background:var(--s2);border-left:1px solid var(--border);padding:14px 12px;display:flex;flex-direction:column;gap:7px;transform:translateX(100%);transition:transform .25s;z-index:10;overflow-y:auto}
.upanel.open{transform:translateX(0)}
.ptitle{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.uitem{display:flex;align-items:center;gap:7px;font-size:12px;padding:6px 8px;border-radius:6px;background:var(--s3);border:1px solid var(--border)}
.ava{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#000;flex-shrink:0}
/* mini */
body.mini .chat-wrap{position:fixed;bottom:16px;right:16px;width:325px;height:465px;border-radius:14px;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.75)}
body.mini #chatScreen{align-items:flex-end;justify-content:flex-end;background:transparent}
/* lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}
.lightbox.show{opacity:1;pointer-events:all}
.lightbox img,.lightbox video{max-width:90vw;max-height:90vh;border-radius:8px}
.lightbox-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;opacity:.7}
.lightbox-close:hover{opacity:1}
/* toast / overlay */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px 18px;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:999;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.overlay{position:fixed;inset:0;background:rgba(8,9,16,.88);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:all}
.spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="overlay" id="overlay"><div class="spin"></div></div>
<div class="toast"   id="toast"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <div id="lightboxContent"></div>
</div>

<!-- Hidden file input -->
<input type="file" id="fileInput" style="display:none" multiple accept="image/*,video/*,.pdf,.doc,.docx,.zip,.txt" onchange="handleFiles(this.files)">

<!-- JOIN -->
<div class="screen" id="joinScreen">
  <div class="card">
    <div class="logo"><div class="logo-pulse"></div> ClassChat</div>
    <div>
      <div class="card-title">Rejoins une <em>salle</em></div>
      <div class="card-sub">// chat discret pour cours en live</div>
    </div>
    <div class="sb-badge">
      <span style="color:var(--accent)">●</span> Supabase connecté — temps réel multi-appareils
    </div>
    <div>
      <div class="lbl">Ton pseudo</div>
      <input type="text" id="pseudoIn" placeholder="ex: ghost99" maxlength="16" autocomplete="off">
    </div>
    <div>
      <div class="lbl">Code de la salle</div>
      <input type="text" id="codeIn" class="code-inp" placeholder="XXXXX" maxlength="6" autocomplete="off" oninput="this.value=this.value.toUpperCase()">
    </div>
    <div class="err" id="joinErr"></div>
    <button class="btn" onclick="joinRoom()">→ Rejoindre</button>
    <div class="divider">ou</div>
    <button class="btn btn-ghost" onclick="createRoom()">+ Créer une salle</button>
  </div>
</div>

<!-- CHAT -->
<div class="screen hidden" id="chatScreen">
  <div class="chat-wrap">
    <div class="chat-hdr">
      <div class="hdr-l">
        <span class="room-badge" id="roomBadge" title="Cliquer pour copier" onclick="copyCode()">????</span>
        <div class="online"><div class="odot"></div><span id="onlineTxt">…</span></div>
      </div>
      <div class="hdr-r">
        <button class="ico" title="Mode mini"  onclick="toggleMini()">⊡</button>
        <button class="ico" title="Membres"    onclick="toggleUsers()">👥</button>
        <button class="ico" title="Quitter"    onclick="leaveRoom()">✕</button>
      </div>
    </div>

    <div class="upanel" id="upanel">
      <div class="ptitle">Membres</div>
      <div id="usersList"></div>
    </div>

    <div class="msgs" id="msgs"></div>
    <div class="typing-bar" id="typingBar"></div>

    <div class="inp-wrap">
      <!-- Upload preview -->
      <div class="upload-preview" id="uploadPreview"></div>
      <!-- Progress -->
      <div class="upload-progress" id="uploadProgress">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <!-- Input row -->
      <div class="inp-area">
        <button class="attach-btn" title="Joindre un fichier" onclick="document.getElementById('fileInput').click()">📎</button>
        <textarea class="msg-inp" id="msgInp" placeholder="Message..." rows="1"
          oninput="autoResize(this)"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
        <button class="send-btn" onclick="sendMsg()">↑</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
const SB_URL = 'https://ersxfcqumaftjucrqjwj.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyc3hmY3F1bWFmdGp1Y3JxandqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDg3NDIsImV4cCI6MjA4ODIyNDc0Mn0.CO_x6t-VyoZ9q2lMRMI7JFuBdTZl_axGpgLcB6POFTE';
const BUCKET  = 'chat-files';
const EMOJIS  = ['👍','❤️','😂','😮','🔥','💀'];
const COLORS  = ['#4ade80','#f472b6','#60a5fa','#fb923c','#a78bfa','#2dd4bf','#fbbf24','#e879f9'];

const $   = id => document.getElementById(id);
const esc = s  => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const rnd = a  => a[Math.floor(Math.random()*a.length)];
const fmtT= ts => new Date(ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
const fmtSize = b => b>1048576 ? (b/1048576).toFixed(1)+' MB' : (b/1024).toFixed(0)+' KB';
const loading = v => $('overlay').classList.toggle('show', v);

window.autoResize = el => {
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,100)+'px';
};
window.toast = (msg,d=2200) => {
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),d);
};
const showErr = (id,msg) => {
  const e=$(id); e.textContent=msg; e.classList.add('show');
  setTimeout(()=>e.classList.remove('show'),3200);
};

let S   = { pseudo:'', color:'', code:'', mini:false, sub:null };
let SB  = null;
let pendingFiles = []; // {file, previewUrl, type}

// ── init ──
async function init() {
  loading(true);
  try {
    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
    SB = createClient(SB_URL, SB_KEY);
    const { error } = await SB.from('messages').select('id').limit(1);
    if (error) throw new Error(error.message);
    loading(false);
    toast('✓ Supabase connecté');
  } catch(e) {
    loading(false);
    showErr('joinErr','⚠ Erreur Supabase : '+e.message);
  }
  $('pseudoIn').focus();
}
init();

// ── join / create ──
const genCode = () => {
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:5},()=>c[Math.floor(Math.random()*c.length)]).join('');
};

window.joinRoom = async () => {
  const pseudo=$('pseudoIn').value.trim();
  const code=$('codeIn').value.trim().toUpperCase();
  if(!pseudo||pseudo.length<2) return showErr('joinErr','Pseudo trop court');
  if(!code||code.length<4)     return showErr('joinErr','Code trop court');
  loading(true);
  const{data,error}=await SB.from('messages').select('id').eq('room_code',code).limit(1);
  loading(false);
  if(error)        return showErr('joinErr','Erreur : '+error.message);
  if(!data?.length)return showErr('joinErr','Salle introuvable');
  enter(pseudo,code);
};

window.createRoom = async () => {
  const pseudo=$('pseudoIn').value.trim();
  if(!pseudo||pseudo.length<2) return showErr('joinErr','Entre ton pseudo d\'abord');
  const code=genCode();
  loading(true);
  const{error}=await SB.from('messages').insert({room_code:code,type:'system',content:`Salle créée par ${pseudo}`});
  loading(false);
  if(error) return showErr('joinErr','Erreur : '+error.message);
  enter(pseudo,code);
  toast(`Salle créée : ${code} 🎉`);
};

// ── enter ──
async function enter(pseudo,code){
  S.pseudo=pseudo; S.code=code; S.color=rnd(COLORS);
  $('roomBadge').textContent=code;
  $('joinScreen').classList.add('hidden');
  $('chatScreen').classList.remove('hidden');
  $('msgInp').focus();

  await SB.from('messages').insert({room_code:code,type:'system',author:pseudo,content:`${pseudo} a rejoint la salle`});

  const{data}=await SB.from('messages').select('*').eq('room_code',code).order('created_at',{ascending:true});
  renderMsgs(data||[]);
  refreshOnline();

  S.sub=SB.channel('room-'+code)
    .on('postgres_changes',{event:'*',schema:'public',table:'messages',filter:`room_code=eq.${code}`},payload=>{
      if(payload.eventType==='INSERT'){appendMsg(payload.new);refreshOnline();}
      if(payload.eventType==='UPDATE'){updateReactions(payload.new);}
    })
    .subscribe();
}

// ── online ──
async function refreshOnline(){
  const{data:joined}=await SB.from('messages').select('author').eq('room_code',S.code).eq('type','system').ilike('content','% a rejoint %');
  const{data:left}  =await SB.from('messages').select('author').eq('room_code',S.code).eq('type','system').ilike('content','% a quitté %');
  const online=new Set((joined||[]).map(r=>r.author).filter(Boolean));
  (left||[]).forEach(r=>online.delete(r.author));
  $('onlineTxt').textContent=`${online.size||1} en ligne`;
  renderUsers([...online].map(n=>({name:n,color:COLORS[n.charCodeAt(0)%COLORS.length]})));
}

// ── file handling ──
window.handleFiles = files => {
  for(const file of files){
    if(file.size > 50*1024*1024){ toast('⚠ Fichier trop lourd (max 50MB)'); continue; }
    const isImg   = file.type.startsWith('image/');
    const isVideo = file.type.startsWith('video/');
    const previewUrl = (isImg||isVideo) ? URL.createObjectURL(file) : null;
    pendingFiles.push({file, previewUrl, type: isImg?'image':isVideo?'video':'file'});
  }
  renderPreviews();
  $('fileInput').value='';
};

function renderPreviews(){
  const wrap=$('uploadPreview');
  if(!pendingFiles.length){wrap.classList.remove('show');return;}
  wrap.classList.add('show');
  wrap.innerHTML=pendingFiles.map((p,i)=>`
    <div class="prev-item">
      ${p.type==='image'?`<img src="${p.previewUrl}" alt="">`:''}
      ${p.type==='video'?`<span style="font-size:20px">🎬</span>`:''}
      ${p.type==='file' ?`<span style="font-size:20px">📄</span>`:''}
      <span class="prev-name">${esc(p.file.name)}</span>
      <button class="prev-rm" onclick="removeFile(${i})">✕</button>
    </div>`).join('');
}

window.removeFile = i => {
  pendingFiles.splice(i,1);
  renderPreviews();
};

// ── send ──
window.sendMsg = async () => {
  const inp=$('msgInp');
  const text=inp.value.trim();
  if(!text && !pendingFiles.length) return;

  inp.value=''; inp.style.height='auto';

  if(pendingFiles.length){
    // upload files first
    $('uploadProgress').classList.add('show');
    const uploaded=[];
    for(let i=0;i<pendingFiles.length;i++){
      const{file,type}=pendingFiles[i];
      const ext=file.name.split('.').pop();
      const path=`${S.code}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
      // progress
      $('progressBar').style.width=Math.round((i/pendingFiles.length)*80)+'%';
      const{data,error}=await SB.storage.from(BUCKET).upload(path,file,{cacheControl:'3600',upsert:false});
      if(error){ toast('⚠ Erreur upload : '+error.message); continue; }
      const{data:{publicUrl}}=SB.storage.from(BUCKET).getPublicUrl(path);
      uploaded.push({url:publicUrl, name:file.name, size:file.size, type, mimeType:file.type});
    }
    $('progressBar').style.width='100%';
    setTimeout(()=>{ $('uploadProgress').classList.remove('show'); $('progressBar').style.width='0%'; },600);

    // send one message per file + optional text on last
    for(let i=0;i<uploaded.length;i++){
      const f=uploaded[i];
      const isLast=(i===uploaded.length-1);
      await SB.from('messages').insert({
        room_code:S.code, type:'media',
        author:S.pseudo, color:S.color,
        content: isLast && text ? text : '',
        reactions:{},
        file_url: f.url,
        file_name: f.name,
        file_size: f.size,
        file_type: f.type,
      });
    }
    pendingFiles=[];
    renderPreviews();
  } else {
    // text only
    await SB.from('messages').insert({
      room_code:S.code, type:'msg',
      author:S.pseudo, color:S.color,
      content:text, reactions:{}
    });
  }
};

// ── reactions ──
window.togglePicker=(msgId,e)=>{
  e.stopPropagation();
  document.querySelectorAll('.picker').forEach(p=>{if(p.dataset.id!==String(msgId))p.classList.add('hidden')});
  document.querySelector(`.picker[data-id="${msgId}"]`)?.classList.toggle('hidden');
};

window.addReaction=async(msgId,emoji,e)=>{
  e.stopPropagation();
  document.querySelectorAll('.picker').forEach(p=>p.classList.add('hidden'));
  const{data}=await SB.from('messages').select('reactions').eq('id',msgId).single();
  const reactions=data?.reactions||{};
  if(!reactions[emoji])reactions[emoji]=[];
  const idx=reactions[emoji].indexOf(S.pseudo);
  if(idx>-1)reactions[emoji].splice(idx,1);else reactions[emoji].push(S.pseudo);
  await SB.from('messages').update({reactions}).eq('id',msgId);
};

// ── leave ──
window.leaveRoom=async()=>{
  await SB.from('messages').insert({room_code:S.code,type:'system',author:S.pseudo,content:`${S.pseudo} a quitté la salle`});
  if(S.sub)SB.removeChannel(S.sub);
  S={pseudo:'',color:'',code:'',mini:false,sub:null};
  pendingFiles=[];
  $('chatScreen').classList.add('hidden');
  $('joinScreen').classList.remove('hidden');
  $('codeIn').value=''; $('msgs').innerHTML='';
  document.body.classList.remove('mini');
};

// ── lightbox ──
window.openLightbox=(url,isVideo)=>{
  const lb=$('lightbox');
  $('lightboxContent').innerHTML=isVideo
    ?`<video src="${url}" controls autoplay style="max-width:90vw;max-height:90vh;border-radius:8px"></video>`
    :`<img src="${url}" style="max-width:90vw;max-height:90vh;border-radius:8px">`;
  lb.classList.add('show');
};
window.closeLightbox=()=>$('lightbox').classList.remove('show');

// ── render ──
function renderMsgs(msgs){
  const c=$('msgs');
  c.innerHTML=msgs.map(buildMsgHTML).join('');
  c.scrollTop=c.scrollHeight;
}

function appendMsg(m){
  const c=$('msgs');
  const atBot=c.scrollHeight-c.scrollTop-c.clientHeight<80;
  c.insertAdjacentHTML('beforeend',buildMsgHTML(m));
  if(atBot)c.scrollTop=c.scrollHeight;
}

function updateReactions(m){
  const el=document.querySelector(`[data-msgid="${m.id}"]`);
  if(!el)return;
  const old=el.querySelector('.reactions');
  const html=buildReactionsHTML(m);
  if(old)old.outerHTML=html||'<span></span>';
  else if(html)el.insertAdjacentHTML('beforeend',html);
}

function buildMsgHTML(m){
  if(m.type==='system')
    return `<div class="msg system"><div class="bubble">${esc(m.content)}</div></div>`;

  const mine=m.author===S.pseudo;
  const time=fmtT(m.created_at||Date.now());
  const color=m.color||COLORS[0];

  let mediaHTML='';
  if(m.file_type==='image'){
    mediaHTML=`<img src="${m.file_url}" alt="${esc(m.file_name)}" loading="lazy"
      onclick="openLightbox('${m.file_url}',false)">`;
  } else if(m.file_type==='video'){
    mediaHTML=`<video src="${m.file_url}" controls preload="metadata"
      style="max-width:100%;max-height:240px;border-radius:8px;display:block;margin-top:4px;cursor:pointer"
      onclick="if(!this.paused)return;openLightbox('${m.file_url}',true)"></video>`;
  } else if(m.file_type==='file'){
    const icon = m.file_name?.endsWith('.pdf')?'📄':m.file_name?.endsWith('.zip')?'🗜️':'📎';
    mediaHTML=`<a class="file-attach" href="${m.file_url}" target="_blank" download="${esc(m.file_name||'fichier')}">
      <span class="file-icon">${icon}</span>
      <div class="file-info">
        <span class="file-name">${esc(m.file_name||'fichier')}</span>
        <span class="file-size">${m.file_size?fmtSize(m.file_size):''}</span>
      </div>
    </a>`;
  }

  const picker=`<div class="picker hidden" data-id="${m.id}">
    ${EMOJIS.map(e=>`<button class="emo" onclick="addReaction('${m.id}','${e}',event)">${e}</button>`).join('')}
  </div>`;

  return `<div class="msg ${mine?'mine':'theirs'}" data-msgid="${m.id}">
    <div class="msg-meta">
      ${!mine?`<span class="msg-author" style="color:${color}">${esc(m.author)}</span>`:''}
      <span>${time}</span>
    </div>
    <div class="bubble">
      ${mediaHTML}
      ${m.content?`<span>${esc(m.content)}</span>`:''}
      <button class="react-btn" onclick="togglePicker('${m.id}',event)">＋</button>
      ${picker}
    </div>
    ${buildReactionsHTML(m)}
  </div>`;
}

function buildReactionsHTML(m){
  if(!m.reactions)return'';
  const pills=Object.entries(m.reactions)
    .filter(([,u])=>u&&u.length)
    .map(([emoji,users])=>{
      const me=users.includes(S.pseudo)?'me':'';
      return `<span class="rpill ${me}" onclick="addReaction('${m.id}','${emoji}',event)">${emoji}<span class="rcnt">${users.length}</span></span>`;
    }).join('');
  return pills?`<div class="reactions">${pills}</div>`:'';
}

function renderUsers(users){
  $('usersList').innerHTML=users.map(u=>`
    <div class="uitem">
      <div class="ava" style="background:${u.color}">${u.name.charAt(0).toUpperCase()}</div>
      <span>${esc(u.name)}</span>
    </div>`).join('');
}

// ── utils ──
window.copyCode   =()=>navigator.clipboard.writeText(S.code).then(()=>toast('Code copié 📋'));
window.toggleMini =()=>{S.mini=!S.mini;document.body.classList.toggle('mini',S.mini)};
window.toggleUsers=()=>$('upanel').classList.toggle('open');
document.addEventListener('click',()=>document.querySelectorAll('.picker').forEach(p=>p.classList.add('hidden')));

// drag & drop sur le chat
document.addEventListener('dragover',e=>{if(S.code)e.preventDefault()});
document.addEventListener('drop',e=>{
  if(!S.code)return;
  e.preventDefault();
  handleFiles(e.dataTransfer.files);
});

$('pseudoIn').focus();
</script>
</body>
</html>
